services:
  gctech-ops:
    build:
      context: .
    container_name: gctech-ops
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3100:3100"
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=16m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - ../GCTech/firebase-applet-config.json:/app/firebase-applet-config.json:ro
      - ./secrets/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
